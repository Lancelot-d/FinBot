name: Deploy to Ampere VM
on:
  push:
    branches:
      - main
jobs:
  deploy-finbot:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger parent infrastructure deploy
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PARENT_REPO_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/Lancelot-d/infra-all-dockers/dispatches \
          -d '{"event_type":"submodule-updated","client_payload":{"repository":"${{ github.repository }}","ref":"${{ github.ref }}"}}'


